<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snake Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
    body, html { width: 100%; height: 100%; background-color: #000; overflow: hidden; }
    canvas { display: block; background-color: #000; }
    #scoreBoard, #gameOver, #startMenu, #footer {
      position: absolute;
      z-index: 2;
      color: #0f0;
      font-size: 24px;
      text-align: center;
    }
    #scoreBoard { top: 10px; left: 20px; }
    #gameOver {
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8); border: 2px solid red;
      color: red; font-size: 32px; padding: 20px 40px; border-radius: 10px; display: none;
    }
    #startMenu {
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8); border: 2px solid #0f0;
      padding: 20px 40px; border-radius: 10px;
    }
    #startMenu button {
      margin: 10px; font-size: 20px; padding: 15px;
      cursor: pointer; border: 2px solid #0f0;
      background-color: black; color: #0f0;
      border-radius: 10px;
    }
    #startMenu button:hover {
      background-color: #333;
      transform: scale(1.1);
    }
    #footer { bottom: 10px; left: 10px; font-size: 14px; color: #888; }
  </style>
</head>
<body>
  <div id="scoreBoard">Score: 0</div>
  <div id="gameOver">Game Over!<br>Score: 0<br>Mode: Easy<br>Press Enter to Restart</div>
  <div id="startMenu">
    <p>Select Difficulty</p>
    <button id="veryEasy">Very Easy</button>
    <button id="easy">Easy</button>
    <button id="medium">Medium</button>
    <button id="hard">Hard</button>
    <button id="veryHard">Very Hard</button>
    <button id="extreme">Impossible</button>
    <button id="iran">Iran</button>
  </div>
  <canvas id="gameCanvas"></canvas>
  <div id="footer">All rights reserved©</div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreBoard = document.getElementById('scoreBoard');
    const gameOverText = document.getElementById('gameOver');
    const startMenu = document.getElementById('startMenu');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const scale = 20;
    const wallOffset = 20;
    const rows = Math.floor((canvas.height - wallOffset * 2) / scale);
    const cols = Math.floor((canvas.width - wallOffset * 2) / scale);
    const spacing = 2;

    let snake, fruit, score = 0;
    let intervalId = null;
    let gameStarted = false;
    let gameMode = '';
    let gameSpeed = 150;
    let directionChosen = false;

    class Snake {
      constructor() {
        this.body = [{ x: Math.floor(cols / 2), y: Math.floor(rows / 2) }];
        this.dir = { x: 0, y: 0 };
        this.length = 1;
      }

      changeDirection(e) {
        const k = e.key.toLowerCase();
        if ((k === "arrowup" || k === "w" || k === "ص") && this.dir.y !== 1) this.dir = { x: 0, y: -1 };
        else if ((k === "arrowdown" || k === "s" || k === "س") && this.dir.y !== -1) this.dir = { x: 0, y: 1 };
        else if ((k === "arrowleft" || k === "a" || k === "ش") && this.dir.x !== 1) this.dir = { x: -1, y: 0 };
        else if ((k === "arrowright" || k === "d" || k === "ی") && this.dir.x !== -1) this.dir = { x: 1, y: 0 };
        directionChosen = true;
      }

      move() {
        if (!directionChosen) return;
        const head = {
          x: this.body[0].x + this.dir.x,
          y: this.body[0].y + this.dir.y
        };
        this.body.unshift(head);
        if (this.body.length > this.length) this.body.pop();
      }

      draw() {
        ctx.fillStyle = '#0f0';
        this.body.forEach(p => {
          ctx.fillRect(
            wallOffset + p.x * scale + spacing / 2,
            wallOffset + p.y * scale + spacing / 2,
            scale - spacing,
            scale - spacing
          );
        });
      }

      eat(fruit) {
        if (this.body[0].x === fruit.x && this.body[0].y === fruit.y) {
          this.length++;
          score++;
          updateScore();
          return true;
        }
        return false;
      }

      collided() {
        const head = this.body[0];
        if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) return true;
        for (let i = 1; i < this.body.length; i++) {
          if (head.x === this.body[i].x && head.y === this.body[i].y) return true;
        }
        return false;
      }

      reset() {
        this.body = [{ x: Math.floor(cols / 2), y: Math.floor(rows / 2) }];
        this.dir = { x: 0, y: 0 };
        this.length = 1;
        score = 0;
        directionChosen = false;
        updateScore();
      }
    }

    class Fruit {
      constructor() {
        this.pickLocation();
      }

      pickLocation() {
        let valid = false;
        while (!valid) {
          this.x = Math.floor(Math.random() * cols);
          this.y = Math.floor(Math.random() * rows);
          valid = !snake?.body.some(p => p.x === this.x && p.y === this.y);
        }
      }

      draw() {
        ctx.fillStyle = 'red';
        ctx.fillRect(
          wallOffset + this.x * scale,
          wallOffset + this.y * scale,
          scale,
          scale
        );
      }
    }

    function drawWalls() {
      ctx.fillStyle = '#0f0';
      ctx.fillRect(wallOffset, wallOffset, canvas.width - wallOffset * 2, 2); // top
      ctx.fillRect(wallOffset, canvas.height - wallOffset - 2, canvas.width - wallOffset * 2, 2); // bottom
      ctx.fillRect(wallOffset, wallOffset, 2, canvas.height - wallOffset * 2); // left
      ctx.fillRect(canvas.width - wallOffset - 2, wallOffset, 2, canvas.height - wallOffset * 2); // right
    }

    function updateScore() {
      scoreBoard.innerText = `Score: ${score} | Mode: ${gameMode}`;
    }

    function gameLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawWalls();
      snake.move();
      if (snake.eat(fruit)) fruit.pickLocation();
      snake.draw();
      fruit.draw();

      if (snake.collided()) {
        clearInterval(intervalId);
        gameOverText.style.display = 'block';
        gameOverText.innerHTML = `Game Over!<br>Score: ${score}<br>Mode: ${gameMode}<br>Press Enter to Restart`;
        gameStarted = false;
      }
    }

    function restartLoop() {
      clearInterval(intervalId);
      intervalId = setInterval(gameLoop, gameSpeed);
    }

    function startGame() {
      snake = new Snake();
      fruit = new Fruit();
      score = 0;
      updateScore();
      gameOverText.style.display = 'none';
      startMenu.style.display = 'none';
      gameStarted = true;
      directionChosen = false;
      restartLoop();
    }

    document.getElementById('veryEasy').onclick = () => { gameMode = 'Very Easy'; gameSpeed = 125; startGame(); };
    document.getElementById('easy').onclick = () => { gameMode = 'Easy'; gameSpeed = 100; startGame(); };
    document.getElementById('medium').onclick = () => { gameMode = 'Medium'; gameSpeed = 75; startGame(); };
    document.getElementById('hard').onclick = () => { gameMode = 'Hard'; gameSpeed = 35; startGame(); };
    document.getElementById('veryHard').onclick = () => { gameMode = 'Very Hard'; gameSpeed = 20; startGame(); };
    document.getElementById('extreme').onclick = () => { gameMode = 'Impossible'; gameSpeed = 10; startGame(); };
    document.getElementById('iran').onclick = () => { gameMode = 'Iran'; gameSpeed = 1; startGame(); };

    const iranBtn = document.getElementById('iran');
    const iranOriginalText = iranBtn.innerText;
    iranBtn.addEventListener('mouseenter', () => iranBtn.innerText = "Don't Click !");
    iranBtn.addEventListener('mouseleave', () => iranBtn.innerText = iranOriginalText);

    window.addEventListener('keydown', e => {
      if (e.key === 'Enter' && gameOverText.style.display === 'block') {
        startGame();
      } else if (gameStarted) {
        snake.changeDirection(e);
      }
    });
  </script>
</body>
</html>
